<!DOCTYPE html>

<head>
  <meta charset="UTF-8" />

  <title>Digital Wardrobe - Wardrobe</title>

  <!-- Google Font: Poppins -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="styles.css" />
</head>

<body>
  <div class="page-wrapper">
    <nav class="navbar">
      <div class="nav-left">👕 Digital Wardrobe</div>
      <div class="nav-links">
        <a href="index.html">Dashboard</a>

        <a href="insights.html">Insights</a>

    <main>
      <div class="main-inner">

          <div class="wardrobe-section-header">

              <p class="wardrobe-subtitle">Top 3 items by times worn.</p>
            </div>
          </div>
          <div class="wardrobe-grid" id="mostWornGrid"></div>

        <section aria-labelledby="wardrobe-title">

              <h2 id="wardrobe-title" class="section-heading">All Items</h2>
              <p class="wardrobe-subtitle">Click “Mark as Worn” to increase the count.</p>
            </div>
          </div>

          <div class="wardrobe-grid" id="wardrobeGrid"></div>
        </section>
      </div>
    </main>

  <script type="module">
    import { requireAuth, setupLogoutButton } from "./auth.js";
    import { loadClothes } from "./wardrobe.js";
    import { loadMostWorn } from "./insights.js";

    await requireAuth();
    setupLogoutButton();
    loadMostWorn();
    loadClothes();
